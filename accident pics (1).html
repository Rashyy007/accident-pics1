<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For nargees eh</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#07091f;overflow:hidden;cursor:pointer;font-family:'DM Sans',sans-serif}

/* LANDING */
#landing{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:radial-gradient(ellipse at 50% 60%,#120630 0%,#07091f 70%);transition:opacity .9s ease,transform .9s ease}
#landing.hide{opacity:0;transform:scale(1.06);pointer-events:none}
.pulse-ring{position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center;margin-bottom:28px}
.pulse-ring::before,.pulse-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:1.5px solid #ff6eb4;animation:ringPulse 2.4s ease-out infinite}
.pulse-ring::after{animation-delay:1.2s}
@keyframes ringPulse{0%{transform:scale(.65);opacity:.9}100%{transform:scale(2);opacity:0}}
.tap-icon{font-size:68px;animation:floatBob 2.8s ease-in-out infinite;filter:drop-shadow(0 0 22px rgba(255,110,180,.75));position:relative;z-index:1}
@keyframes floatBob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.06)}}
.tap-hint{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1.2rem,5vw,1.7rem);color:#c5b4f0;letter-spacing:3px;text-align:center;animation:breathe 2.8s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.55}50%{opacity:1}}
.tap-sub{margin-top:10px;font-size:10px;letter-spacing:5px;text-transform:uppercase;color:rgba(197,180,240,.35)}
.l-star{position:absolute;border-radius:50%;background:white;animation:twinkle linear infinite}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.95}}

/* BIRTHDAY */
#birthday{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity 1s ease;overflow:hidden}
#birthday.show{opacity:1;pointer-events:all}
#sky{position:absolute;inset:0;width:100%;height:100%}
.bd-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:clamp(14px,3.5vh,40px);z-index:10}

/* tagline FIRST, then name */
.bd-tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.95rem,3.5vw,1.25rem);color:#c5b4f0;letter-spacing:4px;text-align:center;opacity:0;transition:opacity 1s .4s}
#birthday.show .bd-tagline{opacity:1}

.bd-name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:clamp(2.4rem,10vw,4.6rem);color:#fff;text-align:center;line-height:1.05;text-shadow:0 0 30px rgba(255,110,180,.8),0 0 70px rgba(255,61,127,.35);opacity:0;transform:translateY(20px);transition:opacity 1s .8s,transform 1s .8s;margin-top:4px}
.bd-name em{color:#ff6eb4;font-style:italic}
#birthday.show .bd-name{opacity:1;transform:translateY(0)}

.luckier-text{font-size:clamp(.5rem,1.8vw,.68rem);letter-spacing:5px;text-transform:uppercase;color:rgba(197,180,240,.5);margin-top:clamp(2px,.8vh,8px);text-align:center;opacity:0;transition:opacity 1s 1.1s}
#birthday.show .luckier-text{opacity:1}

.tree-wrap{position:relative;margin-top:clamp(2px,1vh,12px);width:min(400px,92vw);height:min(320px,46vw,46vh);opacity:0;transition:opacity 1.2s .9s}
#birthday.show .tree-wrap{opacity:1}
#treeCanvas{width:100%;height:100%;display:block}

.bd-msg{max-width:340px;text-align:center;color:rgba(197,180,240,.82);font-size:clamp(.77rem,2.7vw,.92rem);line-height:1.9;padding:0 20px;margin-top:clamp(2px,.9vh,10px);opacity:0;transition:opacity 1s 1.5s}
.bd-msg strong{color:#ff6eb4}
#birthday.show .bd-msg{opacity:1}

.bd-heart{font-size:clamp(26px,6.5vw,40px);margin-top:clamp(4px,1vh,12px);animation:heartbeat 1.4s ease infinite;opacity:0;transition:opacity 1s 1.9s;filter:drop-shadow(0 0 14px rgba(255,61,127,.85))}
#birthday.show .bd-heart{opacity:1}
@keyframes heartbeat{0%,100%{transform:scale(1)}15%{transform:scale(1.3)}30%{transform:scale(1)}45%{transform:scale(1.15)}}

.petal{position:fixed;pointer-events:none;z-index:5;animation:petalRise linear infinite;opacity:0}
@keyframes petalRise{0%{transform:translateY(0) rotate(0deg);opacity:0}7%{opacity:.9}90%{opacity:.45}100%{transform:translateY(-108vh) rotate(560deg);opacity:0}}
</style>
</head>
<body>

<div id="landing">
  <div class="pulse-ring"><div class="tap-icon">🎀</div></div>
  <div class="tap-hint">tap to open</div>
  <div class="tap-sub">✦ &nbsp; something special awaits &nbsp; ✦</div>
</div>

<div id="birthday">
  <canvas id="sky"></canvas>
  <div class="bd-content">
    <div class="bd-tagline">✨ &nbsp; happiest birthday to you &nbsp; ✨</div>
    <div class="bd-name">nargees <em>eh</em> 🎂</div>
    <div class="luckier-text">✦ &nbsp; the world just got luckier &nbsp; ✦</div>
    <div class="tree-wrap"><canvas id="treeCanvas"></canvas></div>
    <div class="bd-msg">Every star tonight is shining <strong>for you</strong>, nargees eh. 🌙<br>You deserve every beautiful thing this universe holds.<br>Wishing you magic, joy, and all the love. 💫</div>
    <div class="bd-heart">❤️</div>
  </div>
</div>

<script>
/* landing stars */
const landing=document.getElementById('landing');
for(let i=0;i<170;i++){const s=document.createElement('div');s.className='l-star';const sz=Math.random()*2+.3;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${1.5+Math.random()*3.5}s;animation-delay:${Math.random()*5}s;`;landing.appendChild(s);}

/* petals */
const PE=['🌸','❤️','✨','💕','⭐','💖','🌟','🎀','💫','🌺'];
for(let i=0;i<24;i++){const p=document.createElement('div');p.className='petal';p.textContent=PE[i%PE.length];p.style.cssText=`left:${Math.random()*100}vw;bottom:-40px;font-size:${9+Math.random()*15}px;animation-duration:${9+Math.random()*13}s;animation-delay:${Math.random()*16}s;`;document.getElementById('birthday').appendChild(p);}

/* tap */
let revealed=false;
document.body.addEventListener('click',()=>{
  if(revealed)return;revealed=true;
  landing.classList.add('hide');
  document.getElementById('birthday').classList.add('show');
  setTimeout(()=>{landing.style.display='none';initSky();initTree();},950);
});

/* SKY */
function initSky(){
  const canvas=document.getElementById('sky');
  const ctx=canvas.getContext('2d');
  function setSize(){canvas.width=innerWidth;canvas.height=innerHeight;}
  setSize();window.addEventListener('resize',setSize);
  const stars=Array.from({length:220},()=>({x:Math.random(),y:Math.random()*.85,r:Math.random()*1.5+.2,phase:Math.random()*Math.PI*2,sp:.5+Math.random()*1.5}));
  function frame(ts){
    const t=ts/1000,W=canvas.width,H=canvas.height;
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#040616');g.addColorStop(.55,'#0b1040');g.addColorStop(1,'#14082e');
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{ctx.globalAlpha=Math.sin(t*s.sp+s.phase)*.4+.55;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;
    const mx=W*.13,my=H*.17;
    const gl=ctx.createRadialGradient(mx,my,1,mx,my,58);gl.addColorStop(0,'rgba(232,220,190,.22)');gl.addColorStop(1,'transparent');
    ctx.fillStyle=gl;ctx.beginPath();ctx.arc(mx,my,58,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e8dfc0';ctx.beginPath();ctx.arc(mx,my,28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#0b1040';ctx.beginPath();ctx.arc(mx+10,my-6,22,0,Math.PI*2);ctx.fill();
    bln(ctx,W*.85,H*.10+Math.sin(t*.65)*7,'#60d0ff',24);
    bln(ctx,W*.93,H*.24+Math.sin(t*.5+1)*6,'#ffe066',19);
    bln(ctx,W*.77,H*.31+Math.sin(t*.85+2)*5,'#ffaacc',15);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
function bln(ctx,x,y,color,r){
  ctx.save();ctx.fillStyle=color;ctx.beginPath();ctx.ellipse(x,y,r*.72,r,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.ellipse(x-r*.22,y-r*.28,r*.2,r*.26,-.3,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.22)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,y+r+3);ctx.quadraticCurveTo(x+8,y+r+26,x-4,y+r+52);ctx.stroke();
  ctx.restore();
}

/* HEART TREE */
function initTree(){
  const canvas=document.getElementById('treeCanvas');
  const ctx=canvas.getContext('2d');
  const DPR=Math.min(window.devicePixelRatio||1,2);
  let W,H,particles=[];

  function setSize(){
    const rect=canvas.getBoundingClientRect();
    W=rect.width;H=rect.height;
    canvas.width=W*DPR;canvas.height=H*DPR;
    ctx.setTransform(DPR,0,0,DPR,0,0);
    build();
  }

  const PC=['#ff2255','#ff5588','#ff88aa','#ffbbcc','#ffcc33','#ff8800',
            '#ff44bb','#ffffff','#ee88ff','#ffdd44','#ff3366','#ffaadd',
            '#ff6644','#ffccaa','#cc44ff','#ff99bb'];

  function isInsideHeart(nx,ny){
    return Math.pow(nx*nx+ny*ny-1,3)-nx*nx*Math.pow(ny,3)<=0;
  }

  function build(){
    particles=[];
    const cx=W*.5;
    const heartBottom=H*.58;
    const R=Math.min(W,H)*.255;
    const hcy=heartBottom-R*.82;
    let attempts=0;
    while(particles.length<420&&attempts<60000){
      attempts++;
      const nx=(Math.random()*2.4)-1.2;
      const ny=(Math.random()*2.4)-1.2;
      if(!isInsideHeart(nx,-ny))continue;
      const px=cx+nx*R;
      const py=hcy+ny*R;
      particles.push({ox:px,oy:py,x:px,y:py,r:1.8+Math.random()*3.2,color:PC[Math.floor(Math.random()*PC.length)],shape:Math.random()<.6?'h':'s',phase:Math.random()*Math.PI*2,speed:.3+Math.random()*.65,amp:.8+Math.random()*2.2});
    }
  }

  function mH(cx,cy,r,c){ctx.save();ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(cx,cy+r*.35);ctx.bezierCurveTo(cx-r*1.4,cy-r*.5,cx-r*2.8,cy+r*.5,cx,cy+r*2.2);ctx.bezierCurveTo(cx+r*2.8,cy+r*.5,cx+r*1.4,cy-r*.5,cx,cy+r*.35);ctx.closePath();ctx.fill();ctx.restore();}
  function mS(cx,cy,r,c){ctx.save();ctx.fillStyle=c;ctx.beginPath();for(let i=0;i<5;i++){const a1=(i*4*Math.PI/5)-Math.PI/2,a2=a1+2*Math.PI/5;ctx.lineTo(cx+r*Math.cos(a1),cy+r*Math.sin(a1));ctx.lineTo(cx+r*.38*Math.cos(a2),cy+r*.38*Math.sin(a2));}ctx.closePath();ctx.fill();ctx.restore();}

  function drawTrunk(){
    const cx=W*.5,heartBottom=H*.58,tBase=H*.97;
    const gr=ctx.createLinearGradient(cx,heartBottom,cx,tBase);
    gr.addColorStop(0,'#c87090');gr.addColorStop(1,'#6a2a44');
    ctx.fillStyle=gr;ctx.beginPath();
    ctx.moveTo(cx-11,tBase);ctx.quadraticCurveTo(cx-8,heartBottom+(tBase-heartBottom)*.45,cx-4,heartBottom);
    ctx.lineTo(cx+4,heartBottom);ctx.quadraticCurveTo(cx+8,heartBottom+(tBase-heartBottom)*.45,cx+11,tBase);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='#c87090';ctx.lineCap='round';
    [[H*.58+(H*.97-H*.58)*.28,-32,38],[H*.58+(H*.97-H*.58)*.22,32,38],[H*.58+(H*.97-H*.58)*.14,-20,28],[H*.58+(H*.97-H*.58)*.08,20,26]].forEach(([by,deg,len])=>{
      const rad=deg*Math.PI/180;ctx.lineWidth=2.8;ctx.beginPath();ctx.moveTo(cx,by);ctx.lineTo(cx+Math.sin(rad)*len,by-Math.cos(rad)*len);ctx.stroke();
    });
  }

  const SP=Array.from({length:10},()=>({x:.05+Math.random()*.9,y:Math.random()*.3,r:1.4+Math.random()*2.2,phase:Math.random()*Math.PI*2}));
  function drawSP(t){SP.forEach(s=>{const a=Math.sin(t*1.9+s.phase)*.5+.5;ctx.save();ctx.globalAlpha=a*.7;ctx.fillStyle='#fff';const x=s.x*W,y=s.y*H,r=s.r;ctx.beginPath();ctx.moveTo(x,y-r*2.2);ctx.lineTo(x+r*.3,y-r*.3);ctx.lineTo(x+r*2.2,y);ctx.lineTo(x+r*.3,y+r*.3);ctx.lineTo(x,y+r*2.2);ctx.lineTo(x-r*.3,y+r*.3);ctx.lineTo(x-r*2.2,y);ctx.lineTo(x-r*.3,y-r*.3);ctx.closePath();ctx.fill();ctx.restore();});}

  function loop(ts){
    const t=ts/1000;ctx.clearRect(0,0,W,H);
    drawSP(t);drawTrunk();
    particles.forEach(p=>{
      p.x=p.ox+Math.sin(t*p.speed+p.phase)*p.amp;
      p.y=p.oy+Math.cos(t*p.speed*.65+p.phase)*p.amp*.55;
      if(p.shape==='h')mH(p.x,p.y,p.r*.52,p.color);
      else             mS(p.x,p.y,p.r,p.color);
    });
    requestAnimationFrame(loop);
  }

  setSize();window.addEventListener('resize',()=>{setSize();});
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
